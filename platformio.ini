; ============================================================================
; PlatformIO Configuration - Vending Machine ESP32
; Board: ESP32-WROOM-32 DevKit V1
; Framework: Arduino + FreeRTOS
; Architecture: Layered + Event Driven + Dual-Core
; ============================================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial Monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DPUMP_DEBUG=1
    -DBOARD_HAS_PSRAM=0
    -DCONFIG_DISABLE_HAL_LOCKS=0

; Upload settings
upload_speed = 921600

; Partition table
board_build.partitions = default.csv
board_build.flash_mode = dio

; Library dependencies
lib_deps = 
    knolleary/PubSubClient@^2.8
    marcoschwartz/LiquidCrystal_I2C@^1.1.4
